# Profiles disponíveis:
#   - (default): Desenvolvimento local com Docker Compose
#   - prod:      Produção (connection strings via variáveis de ambiente)
#   - test:      Testes automatizados
#   - jwt-test:  Teste local apenas de expiração de tokens

server:
  port: 8080
spring:
  application:
    name: manga-reader
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.web.SpringDataWebAutoConfiguration
  docker:
    compose:
      enabled: true          # Desabilitar se não tiver permissão Docker
      lifecycle-management: start-and-stop
      skip:
        in-tests: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect:
        format_sql: true
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        jdbc:
          time_zone: UTC
          batch_size: 50
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    mongodb:
      uri: mongodb://localhost:27017/mangareader
      auto-index-creation: false
    redis:
      host: localhost
      port: 6379
  # Fallback quando o compose está desligado; em dev o spring-boot-docker-compose
  # resolve os connection details do serviço neo4j automaticamente (DT-48).
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: manga_secret
  rabbitmq:
    host: localhost
    port: 5672
    username: manga
    password: manga_secret
  cache:
    type: redis
    redis:
      time-to-live: 300000          # 5 minutos (default)
      cache-null-values: false
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
mongock:
  migration-scan-package: com.mangareader.infrastructure.persistence.mongo.migration
  transactional: false
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
      # Slices MVC e perfis que desabilitam integrações opcionais não registram
      # todos os contributors. Em runtime, cada contributor existente abaixo
      # continua compondo readiness; a ausência de um bean não impede o boot.
      validate-group-membership: false
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,mongo,redis,rabbit,neo4j
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json
app:
  name: Manga Reader
  version: 0.0.1-SNAPSHOT
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    secret: ${JWT_SECRET:manga-reader-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}      # 15 minutos
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}  # 7 dias
    password-reset-expiration: ${JWT_PASSWORD_RESET_EXPIRATION:1800000} # 30 minutos
    cleanup-cron: ${REFRESH_TOKEN_CLEANUP_CRON:0 0 4 * * *}
    revoked-retention-days: ${REFRESH_TOKEN_REVOKED_RETENTION_DAYS:1}
  auth:
    # Secure do cookie do refresh token — false em dev http (o browser
    # descartaria o cookie); produção sobrescreve para true.
    cookie-secure: false
  rate-limit:
    general:
      capacity: ${RATE_LIMIT_GENERAL_CAPACITY:120}
      window: ${RATE_LIMIT_GENERAL_WINDOW:1m}
    auth:
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:15}
      window: ${RATE_LIMIT_AUTH_WINDOW:1m}
    trusted-proxies:
      - ${RATE_LIMIT_TRUSTED_PROXY_IPV4:127.0.0.1}
      - ${RATE_LIMIT_TRUSTED_PROXY_IPV6:::1}
  mail:
    from: noreply@mangareader.dev
    base-url: http://localhost:5173
    admin-email: admin@mangareader.dev
  behavior-analytics:
    retention-days: ${BEHAVIOR_ANALYTICS_RETENTION_DAYS:180}
    title-view-seconds: ${BEHAVIOR_ANALYTICS_TITLE_VIEW_SECONDS:15}
    bounce-min-seconds: ${BEHAVIOR_ANALYTICS_BOUNCE_MIN_SECONDS:2}
    chapter-start-seconds: ${BEHAVIOR_ANALYTICS_CHAPTER_START_SECONDS:10}
    chapter-completion-percent: ${BEHAVIOR_ANALYTICS_CHAPTER_COMPLETION_PERCENT:90}
    max-batch-size: ${BEHAVIOR_ANALYTICS_MAX_BATCH_SIZE:100}
  cache:
    default-ttl: ${CACHE_DEFAULT_TTL:5m}
    title-ttl: ${CACHE_TITLE_TTL:10m}
    tag-ttl: ${CACHE_TAG_TTL:30m}
    rating-average-ttl: ${CACHE_RATING_AVERAGE_TTL:2m}
    public-stats-ttl: ${CACHE_PUBLIC_STATS_TTL:30m}
    subscription-plans-ttl: ${CACHE_SUBSCRIPTION_PLANS_TTL:1h}
---
spring:
  config:
    activate:
      on-profile: jwt-test
app:
  jwt:
    access-token-expiration: 15000    # 15 segundos
    refresh-token-expiration: 30000   # 30 segundos
