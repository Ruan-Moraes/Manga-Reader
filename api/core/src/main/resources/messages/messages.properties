# Locale resolution (Spring ResourceBundleMessageSource):
#   - Accept-Language: pt-BR → este arquivo (default, sem sufixo)
#   - Accept-Language: en-US → messages_en_US.properties
#   - Accept-Language: es-ES → messages_es_ES.properties
#   - Outros locales        → este arquivo (fallback)
#
# Não existe messages_pt_BR.properties: pt-BR é o DEFAULT_LOCALE de I18nConfig
# e este bundle serve simultaneamente como tradução pt-BR e fallback.
# Toda nova chave DEVE ser adicionada aos 3 arquivos (este, _en_US, _es_ES).

