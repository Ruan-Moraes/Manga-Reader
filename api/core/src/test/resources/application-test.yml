# ==============================================================================
# Manga Reader — Test Profile
# ==============================================================================
# Configuração para testes automatizados.
# Usa H2 in-memory para JPA (sem precisar de Docker/Testcontainers).
# MongoDB é desabilitado — testes de integração com MongoDB usarão
# Testcontainers quando configurado.
# ==============================================================================

spring:
  docker:
    compose:
      enabled: false

  # H2 in-memory para testes simples de JPA.
  # DT-54: ${random.uuid} dá um banco POR CONTEXTO Spring — com nome fixo
  # ("testdb"), o ddl-auto create-drop de um contexto sendo fechado (eviction
  # do cache de contextos) derrubava o schema compartilhado e os contextos
  # cacheados restantes viam "database is empty" na suíte completa.
  datasource:
    url: jdbc:h2:mem:testdb-${random.uuid};DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS JSON
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  cache:
    type: none

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.web.SpringDataWebAutoConfiguration

  data:
    mongodb:
      uri: mongodb://localhost:27017/mangareader-test

  # Driver Neo4j é lazy — contexto de teste sobe sem servidor (DT-48);
  # o Neo4jSchemaInitializer tem @Profile("!test").
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: test

logging:
  level:
    root: WARN
    com.mangareader: DEBUG

app:
  # O contexto de integração compartilha IP entre muitas requests. Limites
  # pequenos são exercitados diretamente em RateLimitFilterTest.
  rate-limit:
    general:
      capacity: 10000
      window: 1m
    auth:
      capacity: 10000
      window: 1m
    trusted-proxies:
      - 127.0.0.1
      - ::1
