server:
  port: 8083
spring:
  application:
    name: trending-aggregator
  docker.compose.enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/mangareader
    username: manga
    password: manga_secret
  data.mongodb:
    uri: mongodb://localhost:27017/mangareader
    auto-index-creation: false
mongock:
  enabled: true
  migration-scan-package: com.mangareader.trending.infrastructure.migration
  transactional: false
management.endpoints.web.exposure.include: health,info,metrics
trending:
  seed:
    # Demo local: cria o primeiro ranking somente se title_trend_daily estiver vazia.
    enabled: true
  schedule.cron: ${TRENDING_SCHEDULE_CRON:0 15 3 * * *}
  zone: ${TRENDING_ZONE:America/Sao_Paulo}
  retention-days: ${TRENDING_RETENTION_DAYS:90}
  weights:
    reads: ${TRENDING_WEIGHTS_READS:0.45}
    library-adds: ${TRENDING_WEIGHTS_LIBRARY_ADDS:0.25}
    reviews: ${TRENDING_WEIGHTS_REVIEWS:0.15}
    comments: ${TRENDING_WEIGHTS_COMMENTS:0.10}
    releases: ${TRENDING_WEIGHTS_RELEASES:0.05}
  admin.token: ${TRENDING_ADMIN_TOKEN:}
