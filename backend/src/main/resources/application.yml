# ==============================================================================
# Manga Reader — Configuração Principal
# ==============================================================================
# Profiles disponíveis:
#   - (default): Desenvolvimento local com Docker Compose
#   - prod:      Produção (connection strings via variáveis de ambiente)
#   - test:      Testes automatizados
# ==============================================================================

server:
  port: 8080
spring:
  application:
    name: manga-reader
  docker:
    compose:
      enabled: true          # Desabilitar se não tiver permissão Docker
      lifecycle-management: start-and-stop
      skip:
        in-tests: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    mongodb:
      uri: mongodb://localhost:27017/mangareader?retryWrites=false
      auto-index-creation: false
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: manga
    password: manga_secret
  cache:
    type: redis
    redis:
      time-to-live: 300000          # 5 minutos (default)
      cache-null-values: false
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
mongock:
  migration-scan-package: com.mangareader.infrastructure.persistence.mongo.migration
  transactional: false
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json
app:
  name: Manga Reader
  version: 0.0.1-SNAPSHOT
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    secret: manga-reader-dev-secret-key-that-is-at-least-256-bits-long-for-hs256 # TODO: Alterar para variável de ambiente em produção
    access-token-expiration: 900000      # 15 minutos
    refresh-token-expiration: 604800000  # 7 dias
  mail:
    from: noreply@mangareader.dev
    base-url: http://localhost:5173
    admin-email: admin@mangareader.dev
