<style>
  body { margin:0; background:#161616; min-height:100vh; }
  .app { min-height:100vh; display:flex; flex-direction:column; }
  .main { flex:1; padding-bottom: 72px; } /* room for mobile tab bar */
  button { font-family: inherit; letter-spacing: 0.0625rem; }
  input, textarea { font-family: inherit; letter-spacing: 0.0625rem; }
  * { color: unset; }

  /* Page container — mobile-first */
  .page { max-width:1240px; margin:0 auto; padding:16px 12px; }

  /* Hero — stacks on mobile, side-by-side on md+ */
  .hero {
    position:relative; border-radius:12px; overflow:hidden; margin-bottom:28px;
    background: linear-gradient(135deg,#2a1f0f,#161616);
    display:flex; flex-direction:column-reverse; gap:16px;
    padding:20px;
  }
  .hero-copy { display:flex; flex-direction:column; }
  .hero-title { font-size:clamp(24px, 6vw, 36px); font-weight:700; margin:10px 0 4px; color:#fff; letter-spacing:.0625rem; line-height:1.1; }
  .hero-synopsis { font-size:13px; color:#ccc; max-width:520px; margin-bottom:16px; line-height:1.6; }
  .hero-poster { display:flex; justify-content:center; }

  /* Title page head — stacks mobile, side-by-side md+ */
  .title-head { display:flex; flex-direction:column; gap:18px; margin-bottom:24px; }
  .title-poster { width: min(220px, 55%); margin: 0 auto; }

  /* Visibility helpers for nav */
  .nav-desktop-only { display: none !important; }
  .nav-mobile-only  { display: flex !important; }

  /* Tablet+ */
  @media (min-width: 768px) {
    .main { padding-bottom: 0; }
    .page { padding: 24px 20px; }
    .hero { flex-direction: row; padding: 32px 36px; min-height: 320px; align-items:center; }
    .hero-copy { flex:1; }
    .hero-poster { flex-shrink:0; }
    .title-head { flex-direction: row; gap: 28px; }
    .title-poster { width: 240px; margin: 0; flex-shrink: 0; }
    .nav-desktop-only { display: inline-flex !important; }
    .nav-mobile-only  { display: none !important; }
  }
  @media (min-width: 1024px) {
    .page { padding: 28px 24px; }
    .cat-layout { grid-template-columns: 260px minmax(0, 1fr) !important; }
    .cat-sidebar { display: block !important; }
    .cat-filters-btn { display: none !important; }
    .group-about { grid-template-columns: minmax(0, 1fr) 280px !important; }
    .events-special-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    .events-normal-grid  { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
    .auth-shell { grid-template-columns: 360px minmax(0, 1fr) !important; }
    .auth-side { display: block !important; }
  }
  @media (min-width: 640px) and (max-width: 1023px) {
    .events-normal-grid  { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
  }
  @media (max-width: 1023px) {
    .cat-filters-btn { display: inline-flex !important; }
  }
</style>
